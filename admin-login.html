<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | VET FOR PET CLINIC</title>
  <!-- ============================================ -->
  <!-- SECTION 1: EXTERNAL STYLESHEETS & FONTS      -->
  <!-- ============================================ -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- ============================================ -->
  <!-- SECTION 2: LOGIN PAGE STYLES                 -->
  <!-- ============================================ -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #0f172a, #1e293b); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    
    .login-container { 
      width: 100%; 
      max-width: 450px; 
      padding: 20px; 
    }
    
    .login-card { 
      background: white; 
      border-radius: 32px; 
      padding: 40px; 
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
      animation: fadeIn 0.3s ease; 
    }
    
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    .login-header { text-align: center; margin-bottom: 32px; }
    
    .logo-icon { 
      width: 70px; 
      height: 70px; 
      background: linear-gradient(135deg, #f97316, #ea580c); 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      margin: 0 auto 20px; 
      font-size: 32px; 
      color: white; 
    }
    
    .login-header h1 { font-size: 1.5rem; color: #0f172a; }
    .login-header p { color: #64748b; font-size: 0.85rem; }
    
    .form-group { margin-bottom: 20px; }
    
    .input-with-icon { position: relative; }
    .input-with-icon i { 
      position: absolute; 
      left: 16px; 
      top: 50%; 
      transform: translateY(-50%); 
      color: #94a3b8; 
    }
    .input-with-icon input { 
      width: 100%; 
      padding: 14px 16px 14px 45px; 
      border: 2px solid #e2e8f0; 
      border-radius: 16px; 
      font-size: 1rem; 
      transition: all 0.2s; 
    }
    .input-with-icon input:focus { 
      outline: none; 
      border-color: #f97316; 
      box-shadow: 0 0 0 3px rgba(249,115,22,0.1); 
    }
    
    .login-btn { 
      width: 100%; 
      padding: 14px; 
      background: linear-gradient(135deg, #f97316, #ea580c); 
      color: white; 
      border: none; 
      border-radius: 16px; 
      font-size: 1rem; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s; 
    }
    .login-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 10px 20px rgba(249,115,22,0.3); 
    }
    
    .error-message { 
      background: #fef2f2; 
      color: #ef4444; 
      padding: 12px; 
      border-radius: 12px; 
      margin-bottom: 20px; 
      display: none; 
      font-size: 0.85rem; 
    }
    
    .demo-credentials { 
      margin-top: 24px; 
      padding-top: 24px; 
      border-top: 1px solid #e2e8f0; 
      text-align: center; 
    }
    
    .demo-badge { 
      display: inline-flex; 
      gap: 16px; 
      background: #f1f5f9; 
      padding: 8px 16px; 
      border-radius: 50px; 
      font-size: 0.7rem; 
      font-family: monospace; 
    }
    
    .user-type-selector { 
      display: flex; 
      gap: 10px; 
      margin-bottom: 20px; 
    }
    
    .user-type-btn { 
      flex: 1; 
      padding: 10px; 
      background: #f1f5f9; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: 500; 
      transition: all 0.3s; 
    }
    .user-type-btn.active { background: #f97316; color: white; }
    
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #94a3b8; text-decoration: none; font-size: 0.8rem; }
    .back-link a:hover { color: #f97316; }
  </style>
</head>
<body>

<!-- ============================================ -->
<!-- SECTION 3: LOGIN CONTAINER                   -->
<!-- ============================================ -->
<div class="login-container">
  <div class="login-card">
    
    <!-- ===== LOGIN HEADER ===== -->
    <div class="login-header">
      <div class="logo-icon"><i class="fas fa-user-shield"></i></div>
      <h1>Admin Portal</h1>
      <p>VET FOR PET CLINIC</p>
    </div>
    
    <!-- ===== USER TYPE SELECTOR ===== -->
    <div class="user-type-selector">
      <button class="user-type-btn active" data-type="super_admin">Super Admin</button>
      <button class="user-type-btn" data-type="manager">Manager</button>
      <button class="user-type-btn" data-type="receptionist">Receptionist</button>
    </div>
    
    <!-- ===== ERROR MESSAGE ===== -->
    <div id="errorMessage" class="error-message">
      <i class="fas fa-exclamation-circle"></i> Invalid credentials
    </div>
    
    <!-- ===== LOGIN FORM ===== -->
    <form id="loginForm">
      <div class="form-group">
        <div class="input-with-icon">
          <i class="fas fa-envelope"></i>
          <input type="text" id="username" placeholder="Email or Username" autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <div class="input-with-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Enter your password">
        </div>
      </div>
      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    
    <!-- ===== DEMO CREDENTIALS ===== -->
    <div class="demo-credentials">
      <p>Demo Access</p>
      <div class="demo-badge" id="demoCredentials">
        <span><strong>Super Admin:</strong> admin@vetforpet.com / admin123</span>
      </div>
    </div>
    
    <!-- ===== BACK LINK ===== -->
    <div class="back-link">
      <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Patient Portal</a>
    </div>
  </div>
</div>

<!-- ============================================ -->
<!-- SECTION 4: LOGIN SCRIPT (রোল অনুযায়ী রিডাইরেক্ট) -->
<!-- ============================================ -->
<script>
  // ============================================
  // স্ট্যাটিক ইউজার ডাটাবেস (রোল ভিত্তিক)
  // ============================================
  const USERS = {
    // সুপার অ্যাডমিন - সম্পূর্ণ অ্যাক্সেস
    super_admin: { 
      email: "admin@vetforpet.com", 
      password: "admin123", 
      name: "Super Admin", 
      role: "super_admin", 
      permissions: "full",
      dashboard: "admin-dashboard.html"  // ← অ্যাডমিন ড্যাশবোর্ড
    },
    
    // ম্যানেজার - লিমিটেড অ্যাক্সেস
    manager: { 
      email: "manager@vetforpet.com", 
      password: "manager123", 
      name: "Clinic Manager", 
      role: "manager", 
      permissions: "view_appointments,add_appointments,edit_appointments,manage_doctors,manage_services,reports",
      dashboard: "admin-dashboard.html"  // ← অ্যাডমিন ড্যাশবোর্ড (লিমিটেড)
    },
    
    // রিসেপশনিস্ট - শুধু ভিউ + নিউ বুকিং
    receptionist: { 
      email: "reception@vetforpet.com", 
      password: "reception123", 
      name: "Receptionist", 
      role: "receptionist", 
      permissions: "view_appointments,add_appointments",
      dashboard: "reception-dashboard.html"  // ← আলাদা রিসেপশনিস্ট ড্যাশবোর্ড
    }
  };
  
  // বর্তমানে নির্বাচিত ইউজার টাইপ
  let selectedUserType = 'super_admin';
  
  // ============================================
  // ইউজার টাইপ সিলেক্টর ইভেন্ট হ্যান্ডলার
  // ============================================
  document.querySelectorAll('.user-type-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      // অ্যাক্টিভ ক্লাস আপডেট
      document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      
      // নির্বাচিত টাইপ সংরক্ষণ
      selectedUserType = this.getAttribute('data-type');
      
      // ডেমো ক্রেডেনশিয়াল আপডেট
      const demoSpan = document.getElementById('demoCredentials');
      if (selectedUserType === 'super_admin') {
        demoSpan.innerHTML = '<span><strong>Super Admin:</strong> admin@vetforpet.com / admin123</span>';
      } else if (selectedUserType === 'manager') {
        demoSpan.innerHTML = '<span><strong>Manager:</strong> manager@vetforpet.com / manager123</span>';
      } else {
        demoSpan.innerHTML = '<span><strong>Receptionist:</strong> reception@vetforpet.com / reception123</span>';
      }
    });
  });
  
  // ============================================
  // লগইন ফর্ম সাবমিট হ্যান্ডলার
  // ============================================
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    
    let user = null;
    
    // নির্বাচিত ইউজার টাইপ অনুযায়ী ক্রেডেনশিয়াল চেক
    for (let [role, creds] of Object.entries(USERS)) {
      if (creds.email === username && creds.password === password && role === selectedUserType) {
        user = { ...creds, userType: creds.role };
        break;
      }
    }
    
    // ============================================
    // লগইন সফল হলে - রোল অনুযায়ী রিডাইরেক্ট
    // ============================================
    if (user) {
      // সেশন স্টোরেজে ইউজার তথ্য সংরক্ষণ
      sessionStorage.setItem('admin_logged_in', 'true');
      sessionStorage.setItem('admin_name', user.name);
      sessionStorage.setItem('admin_role', user.role);
      sessionStorage.setItem('admin_email', user.email);
      sessionStorage.setItem('admin_permissions', user.permissions);
      sessionStorage.setItem('admin_user_type', user.userType);
      
      // 🔥 গুরুত্বপূর্ণ: রোল অনুযায়ী ড্যাশবোর্ড রিডাইরেক্ট 🔥
      // সুপার অ্যাডমিন → admin-dashboard.html
      // ম্যানেজার → admin-dashboard.html (লিমিটেড)
      // রিসেপশনিস্ট → reception-dashboard.html (আলাদা)
      window.location.href = user.dashboard;
      
    } else {
      // লগইন ব্যর্থ হলে এরর মেসেজ দেখান
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
    }
  });
</script>
</body>
</html>
